openapi: 3.0.1

info:
  title: Blogpost API
  description: >-
    API zur Verwaltung von Blogposts. Ein Blogpost besteht aus einem Titel
    (höchstens 50 Zeichen) und einem Textinhalt. Zusätzlich wird der Zeitpunkt
    der letzten Änderung geführt.


    Jeder Blogpost wird von einem Autor verfasst. Autoren verfügen über einen
    technischen Benutzernamen (für den API-Zugang), einen echten Namen, ein
    persönliches Motto (höchstens 30 Zeichen) sowie optional ein Avatar-Bild.


    Blogposts können über Hashtags thematisch kategorisiert werden. Hashtags
    bilden ein kontrolliertes Vokabular und müssen angelegt sein, bevor sie
    einem Blogpost zugeordnet werden; Blogposts lassen sich nach einem Hashtag
    filtern.


    Zu jedem Blogpost können Bewertungen (Ratings) mit 1 bis 5 Sternen und einem
    optionalen Kommentar abgegeben werden. Ratings sind eine Subressource des
    Blogposts; jeder Blogpost führt zusätzlich die aggregierten Felder
    `averageRating` und `ratingCount`.


    **Breaking Change in 2.0.0:** Beim Anlegen eines Blogposts ist das Feld
    `authorId` nun ein Pflichtfeld. Clients der Version 1.x, die keinen Autor
    mitsenden, sind nicht mehr kompatibel. Die Autorschaft ist nach dem Anlegen
    unveränderlich und kann über `PUT` nicht geändert werden.
  version: 2.0.0

servers:
  - url: 'https://localhost:8080'
    description: Lokaler Entwicklungsserver

tags:
  - name: Blogposts
    description: Operationen zum Verwalten von Blogposts
  - name: Authors
    description: Operationen zum Verwalten von Autoren und ihren Avataren
  - name: Hashtags
    description: >-
      Operationen zum Verwalten von Hashtags und zum Zuordnen von Hashtags
      zu Blogposts. Hashtags bilden ein kontrolliertes Vokabular: Sie müssen
      angelegt sein, bevor sie einem Blogpost zugewiesen werden können.
  - name: Ratings
    description: >-
      Operationen zum Verwalten der Bewertungen (Ratings) eines Blogposts.
      Ratings sind eine Subressource eines Blogposts und existieren nicht
      unabhängig von diesem.

paths:
  /blogposts:
    get:
      tags:
        - Blogposts
      summary: Alle Blogposts abrufen
      description: >-
        Liefert die Liste aller vorhandenen Blogposts. Über den optionalen
        Query-Parameter `hashtag` kann die Liste auf Blogposts eingeschränkt
        werden, denen der angegebene Hashtag zugeordnet ist.


        Jeder Blogpost enthält immer die aggregierten Bewertungsfelder
        `averageRating` und `ratingCount`. Die einzelnen Ratings werden aus
        Gründen der Datensparsamkeit (Vermeidung von Over-Fetching)
        standardmäßig nicht mitgeliefert. Über den Parameter `includeRatings`
        können sie bei Bedarf eingebettet werden.
      operationId: listBlogposts
      parameters:
        - $ref: '#/components/parameters/HashtagFilter'
        - $ref: '#/components/parameters/IncludeRatings'
      responses:
        '200':
          description: Liste aller Blogposts (kann leer sein).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Blogpost'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Blogposts
      summary: Blogpost anlegen
      description: >-
        Legt einen neuen Blogpost an. Die Felder `id` und `lastModified` werden
        vom Server vergeben und dürfen nicht mitgesendet werden.
      operationId: createBlogpost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogpostCreate'
      responses:
        '201':
          description: Der Blogpost wurde angelegt.
          headers:
            Location:
              description: URL des neu angelegten Blogposts.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blogpost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /blogposts/{id}:
    parameters:
      - $ref: '#/components/parameters/BlogpostId'
    get:
      tags:
        - Blogposts
      summary: Einzelnen Blogpost abrufen
      description: >-
        Liefert den Blogpost mit der angegebenen ID. Wie bei der Liste können
        über `includeRatings` die einzelnen Ratings eingebettet werden.
      operationId: getBlogpost
      parameters:
        - $ref: '#/components/parameters/IncludeRatings'
      responses:
        '200':
          description: Der angeforderte Blogpost.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blogpost'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Blogposts
      summary: Blogpost ersetzen
      description: >-
        Ersetzt Titel und Inhalt des Blogposts mit der angegebenen ID
        vollständig. Die Autorschaft ist unveränderlich und kann hierüber nicht
        geändert werden. Der Zeitstempel `lastModified` wird dabei vom Server
        aktualisiert. Da sich die Ressource ändert, wird der aktualisierte
        Blogpost mit Status 200 zurückgegeben.
      operationId: replaceBlogpost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogpostInput'
      responses:
        '200':
          description: Der Blogpost wurde ersetzt und wird zurückgegeben.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blogpost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Blogposts
      summary: Blogpost löschen
      description: Löscht den Blogpost mit der angegebenen ID.
      operationId: deleteBlogpost
      responses:
        '204':
          description: Der Blogpost wurde gelöscht. Kein Inhalt im Body.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /authors:
    get:
      tags:
        - Authors
      summary: Alle Autoren abrufen
      description: Liefert die Liste aller vorhandenen Autoren.
      operationId: listAuthors
      responses:
        '200':
          description: Liste aller Autoren (kann leer sein).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Authors
      summary: Autor anlegen
      description: >-
        Legt einen neuen Autor an. Das Feld `id` wird vom Server vergeben und
        darf nicht mitgesendet werden. Ein Avatar wird nicht hier, sondern über
        `PUT /authors/{id}/avatar` hochgeladen.
      operationId: createAuthor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorInput'
      responses:
        '201':
          description: Der Autor wurde angelegt.
          headers:
            Location:
              description: URL des neu angelegten Autors.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /authors/{id}:
    parameters:
      - $ref: '#/components/parameters/AuthorId'
    get:
      tags:
        - Authors
      summary: Einzelnen Autor abrufen
      description: Liefert den Autor mit der angegebenen ID.
      operationId: getAuthor
      responses:
        '200':
          description: Der angeforderte Autor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Authors
      summary: Autor bearbeiten
      description: >-
        Ersetzt die vom Autor selbst editierbaren Felder (`name` und `motto`)
        vollständig. Es handelt sich um ein echtes Ersetzen dieser Felder: Ein
        nicht mitgesendetes `motto` wird dabei entfernt. Der technische
        Benutzername (`username`) sowie die `id` sind unveränderlich und können
        hierüber nicht geändert werden.
      operationId: replaceAuthor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorEditable'
      responses:
        '200':
          description: Der Autor wurde aktualisiert und wird zurückgegeben.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /authors/{id}/avatar:
    parameters:
      - $ref: '#/components/parameters/AuthorId'
    get:
      tags:
        - Authors
      summary: Avatar eines Autors abrufen
      description: >-
        Liefert das Avatar-Bild des Autors als Binärdaten. Aufgerufen wird
        typischerweise die versionierte `avatarUrl` aus dem Autor-Objekt.
      operationId: getAuthorAvatar
      parameters:
        - name: v
          in: query
          required: false
          description: >-
            Opaker Versions-Token des Avatars (Cache-Busting). Der Wert wird vom
            Server in der `avatarUrl` vergeben; Clients rufen diese URL einfach
            unverändert auf. Der Token dient ausschließlich dazu, jeder
            Avatar-Version eine eindeutige, cachebare URL zu geben – er wählt
            **keine** bestimmte historische Version aus: Der Server liefert
            stets das aktuelle Avatar, unabhängig vom übergebenen Wert. Wird der
            Parameter weggelassen, wird ebenfalls das aktuelle Avatar geliefert
            (dann jedoch ohne die für Langzeit-Caching gedachte eindeutige URL).
          schema:
            type: string
          example: 8f3a1c9d
      responses:
        '200':
          description: Das Avatar-Bild des Autors.
          headers:
            Cache-Control:
              description: >-
                Weil die aufgerufene URL einen Versions-Token enthält, kann das
                Bild langlebig gecacht werden: `immutable` teilt dem Client mit,
                dass sich der Inhalt unter genau dieser URL nie ändert, und
                `max-age` legt die Cache-Dauer in Sekunden fest (hier ein Jahr).
                Ein neues Avatar erhält eine andere URL und wird deshalb neu
                geladen – der alte Cache-Eintrag stört dabei nicht.
              schema:
                type: string
              example: 'public, max-age=31536000, immutable'
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          description: >-
            Der Autor existiert nicht oder hat (noch) kein Avatar hinterlegt.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Authors
      summary: Avatar eines Autors hochladen
      description: >-
        Lädt das Avatar-Bild des Autors hoch bzw. ersetzt ein vorhandenes.
        Erlaubt sind kleine Bilder in den Formaten PNG oder JPEG.


        Nach einem erfolgreichen Upload vergibt der Server einen neuen
        Versions-Token. Die `avatarUrl` des Autors ändert sich dadurch, sodass
        zuvor zwischengespeicherte Kopien automatisch ungültig werden und Clients
        das neue Bild laden (siehe `avatarUrl` im Schema `Author`).
      operationId: uploadAuthorAvatar
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
      responses:
        '204':
          description: >-
            Das Avatar wurde gespeichert. Es wird kein Body zurückgegeben; die
            neue, versionierte Bild-URL steht im `Content-Location`-Header.
          headers:
            Content-Location:
              description: >-
                URL des soeben gespeicherten Avatars inklusive des neuen
                Versions-Tokens. Der Client kann diese URL direkt verwenden,
                ohne den Autor erneut abzurufen.
              schema:
                type: string
                format: uri
              example: 'https://localhost:8080/authors/7c9e6679-7425-40de-944b-e07fc1f90ae7/avatar?v=8f3a1c9d'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /blogposts/{id}/hashtags/{tag}:
    parameters:
      - $ref: '#/components/parameters/BlogpostId'
      - $ref: '#/components/parameters/HashtagName'
    put:
      tags:
        - Hashtags
      summary: Hashtag einem Blogpost zuordnen
      description: >-
        Ordnet den Hashtag `tag` dem Blogpost mit der angegebenen ID zu. Die
        Operation ist idempotent: Ist der Hashtag bereits zugeordnet, bleibt
        der Zustand unverändert. Der Hashtag muss zuvor als Vokabular-Eintrag
        angelegt worden sein; andernfalls wird mit 404 geantwortet.
      operationId: assignHashtagToBlogpost
      responses:
        '204':
          description: >-
            Der Hashtag ist dem Blogpost zugeordnet (neu zugeordnet oder war
            bereits zugeordnet). Kein Inhalt im Body.
        '404':
          description: >-
            Es existiert kein Blogpost mit der angegebenen ID oder kein
            Hashtag mit dem angegebenen Namen.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Hashtags
      summary: Hashtag von einem Blogpost entfernen
      description: >-
        Entfernt die Zuordnung des Hashtags `tag` vom Blogpost mit der
        angegebenen ID. Der Hashtag selbst bleibt als Vokabular-Eintrag
        bestehen.
      operationId: removeHashtagFromBlogpost
      responses:
        '204':
          description: Die Zuordnung wurde entfernt. Kein Inhalt im Body.
        '404':
          description: >-
            Es existiert kein Blogpost mit der angegebenen ID, kein Hashtag
            mit dem angegebenen Namen, oder der Hashtag ist dem Blogpost
            nicht zugeordnet.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hashtags:
    get:
      tags:
        - Hashtags
      summary: Alle Hashtags abrufen
      description: Liefert die Liste aller vorhandenen Hashtags.
      operationId: listHashtags
      responses:
        '200':
          description: Liste aller Hashtags (kann leer sein).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Hashtag'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Hashtags
      summary: Hashtag anlegen
      description: >-
        Legt einen neuen Hashtag im Vokabular an. Der Name muss eindeutig sein;
        existiert bereits ein Hashtag mit demselben Namen, wird mit 409
        geantwortet. Der Vergleich erfolgt case-insensitiv, d. h. `Java` und
        `java` gelten als derselbe Name.
      operationId: createHashtag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HashtagInput'
      responses:
        '201':
          description: Der Hashtag wurde angelegt.
          headers:
            Location:
              description: URL des neu angelegten Hashtags.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hashtag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hashtags/{tag}:
    parameters:
      - $ref: '#/components/parameters/HashtagName'
    get:
      tags:
        - Hashtags
      summary: Einzelnen Hashtag abrufen
      description: Liefert den Hashtag mit dem angegebenen Namen inklusive Beschreibung.
      operationId: getHashtag
      responses:
        '200':
          description: Der angeforderte Hashtag.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hashtag'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Hashtags
      summary: Beschreibung eines Hashtags aktualisieren
      description: >-
        Aktualisiert die Beschreibung des Hashtags mit dem angegebenen Namen.
        Der Name selbst ist unveränderlich und wird über den Pfad bestimmt.
      operationId: updateHashtag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HashtagUpdate'
      responses:
        '200':
          description: Der Hashtag wurde aktualisiert und wird zurückgegeben.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Hashtag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Hashtags
      summary: Hashtag löschen
      description: >-
        Löscht den Hashtag mit dem angegebenen Namen aus dem Vokabular. Damit
        wird der Hashtag auch von allen Blogposts entfernt, denen er zugeordnet
        war.
      operationId: deleteHashtag
      responses:
        '204':
          description: Der Hashtag wurde gelöscht. Kein Inhalt im Body.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /blogposts/{id}/ratings:
    parameters:
      - $ref: '#/components/parameters/BlogpostId'
    get:
      tags:
        - Ratings
      summary: Alle Ratings eines Blogposts abrufen
      description: >-
        Liefert alle Bewertungen (Ratings) des Blogposts mit der angegebenen ID.
      operationId: listRatings
      responses:
        '200':
          description: Liste aller Ratings des Blogposts (kann leer sein).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Rating'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Ratings
      summary: Rating anlegen
      description: >-
        Fügt dem Blogpost mit der angegebenen ID eine neue Bewertung hinzu. Die
        Felder `id` und `createdAt` werden vom Server vergeben und dürfen nicht
        mitgesendet werden. Ein einmal angelegtes Rating ist unveränderlich; es
        gibt daher weder eine Ersetzen- noch eine Löschen-Operation.
      operationId: createRating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingInput'
      responses:
        '201':
          description: Das Rating wurde angelegt.
          headers:
            Location:
              description: URL des neu angelegten Ratings.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /blogposts/{id}/ratings/{ratingId}:
    parameters:
      - $ref: '#/components/parameters/BlogpostId'
      - $ref: '#/components/parameters/RatingId'
    get:
      tags:
        - Ratings
      summary: Einzelnes Rating abrufen
      description: >-
        Liefert das Rating mit der angegebenen `ratingId` des Blogposts mit der
        angegebenen `id`.
      operationId: getRating
      responses:
        '200':
          description: Das angeforderte Rating.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    BlogpostId:
      name: id
      in: path
      required: true
      description: Eindeutige ID des Blogposts.
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6

    AuthorId:
      name: id
      in: path
      required: true
      description: Eindeutige ID des Autors.
      schema:
        type: string
        format: uuid
      example: 7c9e6679-7425-40de-944b-e07fc1f90ae7

    RatingId:
      name: ratingId
      in: path
      required: true
      description: Eindeutige ID des Ratings innerhalb des Blogposts.
      schema:
        type: string
        format: uuid
      example: 7c9e6679-7425-40de-944b-e07fc1f90ae7

    HashtagName:
      name: tag
      in: path
      required: true
      description: >-
        Kanonischer Name des Hashtags ohne führendes „#“ (z. B. `java`). Namen
        werden case-insensitiv behandelt: `Java` und `java` bezeichnen denselben
        Hashtag.
      schema:
        type: string
        minLength: 1
        maxLength: 50
        pattern: '^[A-Za-z0-9_]+$'
      example: java

    HashtagFilter:
      name: hashtag
      in: query
      required: false
      description: >-
        Schränkt die Liste auf Blogposts ein, denen der angegebene Hashtag
        (kanonischer Name ohne „#“) zugeordnet ist. Der Vergleich erfolgt
        case-insensitiv.
      schema:
        type: string
        minLength: 1
        maxLength: 50
        pattern: '^[A-Za-z0-9_]+$'
      example: java

    IncludeRatings:
      name: includeRatings
      in: query
      required: false
      description: >-
        Legt fest, ob die einzelnen Ratings in die zurückgelieferten Blogposts
        eingebettet werden. Bei `false` (Standard) enthält jeder Blogpost nur
        die aggregierten Felder `averageRating` und `ratingCount`; das Feld
        `ratings` wird weggelassen. Bei `true` wird zusätzlich das Feld
        `ratings` mit allen Bewertungen gefüllt.
      schema:
        type: boolean
        default: false
      example: true

  schemas:
    BlogpostInput:
      type: object
      description: >-
        Vom Client bereitgestellte, änderbare Daten eines Blogposts. Wird beim
        Ersetzen (`PUT`) verwendet. Die Autorschaft ist nicht Teil dieses
        Schemas, da sie nach dem Anlegen unveränderlich ist.
      required:
        - title
        - content
      properties:
        title:
          type: string
          description: Titel des Blogposts.
          minLength: 1
          maxLength: 50
          example: Mein erster Blogpost
        content:
          type: string
          description: Textinhalt des Blogposts (Plaintext).
          example: Dies ist der Inhalt meines ersten Blogposts.
      additionalProperties: false

    BlogpostCreate:
      type: object
      description: >-
        Daten zum Anlegen eines Blogposts (`POST`). Zusätzlich zu Titel und
        Inhalt muss der Autor angegeben werden.
      required:
        - title
        - content
        - authorId
      properties:
        title:
          type: string
          description: Titel des Blogposts.
          minLength: 1
          maxLength: 50
          example: Mein erster Blogpost
        content:
          type: string
          description: Textinhalt des Blogposts (Plaintext).
          example: Dies ist der Inhalt meines ersten Blogposts.
        authorId:
          type: string
          format: uuid
          description: >-
            ID des Autors, dem der Blogpost zugeordnet wird. Muss auf einen
            existierenden Autor verweisen und ist nach dem Anlegen
            unveränderlich.
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
      additionalProperties: false

    Blogpost:
      type: object
      description: Ein vollständiger Blogpost inklusive der servergenerierten Felder.
      required:
        - id
        - title
        - content
        - author
        - lastModified
      properties:
        id:
          type: string
          format: uuid
          description: Eindeutige, vom Server vergebene ID des Blogposts.
          readOnly: true
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        title:
          type: string
          description: Titel des Blogposts.
          minLength: 1
          maxLength: 50
          example: Mein erster Blogpost
        content:
          type: string
          description: Textinhalt des Blogposts (Plaintext).
          example: Dies ist der Inhalt meines ersten Blogposts.
        author:
          allOf:
            - $ref: '#/components/schemas/AuthorSummary'
          description: >-
            Kurzinformationen zum Autor des Blogposts. Wird vom Server anhand
            der beim Anlegen/Ersetzen übergebenen `authorId` befüllt.
          readOnly: true
        lastModified:
          type: string
          format: date-time
          description: >-
            Zeitpunkt der letzten Änderung (ISO 8601). Wird vom Server
            gesetzt und aktualisiert.
          readOnly: true
          example: '2026-07-22T11:19:00Z'
        hashtags:
          type: array
          description: >-
            Die dem Blogpost zugeordneten Hashtags (kanonische Namen ohne „#“).
            Die Zuordnung wird ausschließlich über die Endpunkte unter
            `/blogposts/{id}/hashtags/{tag}` gepflegt und kann daher hier nicht
            direkt gesetzt werden.
          readOnly: true
          items:
            type: string
            minLength: 1
            maxLength: 50
            pattern: '^[A-Za-z0-9_]+$'
            example: java
          example:
            - java
            - api
        averageRating:
          type: number
          format: double
          nullable: true
          minimum: 1
          maximum: 5
          description: >-
            Durchschnittliche Sternebewertung über alle Ratings dieses
            Blogposts. Ist `null`, solange noch keine Ratings vorliegen
            (`ratingCount` ist dann `0`).
          readOnly: true
          example: 4.5
        ratingCount:
          type: integer
          format: int32
          minimum: 0
          description: Anzahl der für diesen Blogpost abgegebenen Ratings.
          readOnly: true
          example: 12
        ratings:
          type: array
          description: >-
            Die einzelnen Ratings dieses Blogposts. Wird nur eingebettet, wenn
            die Anfrage den Parameter `includeRatings=true` gesetzt hat, und
            sonst weggelassen.
          readOnly: true
          items:
            $ref: '#/components/schemas/Rating'

    Hashtag:
      type: object
      description: >-
        Ein Hashtag zur thematischen Kategorisierung von Blogposts, bestehend
        aus einem eindeutigen Namen und einer optionalen Beschreibung.
      required:
        - name
      properties:
        name:
          type: string
          description: >-
            Kanonischer, eindeutiger Name des Hashtags ohne führendes „#“. Namen
            werden case-insensitiv behandelt: `Java` und `java` bezeichnen
            denselben Hashtag und gelten daher als eindeutig identisch.
          minLength: 1
          maxLength: 50
          pattern: '^[A-Za-z0-9_]+$'
          example: java
        description:
          type: string
          description: Optionale, kurze Beschreibung des Themas des Hashtags.
          maxLength: 200
          example: Tutorials und Neuigkeiten rund um die Java-Sprache und -Plattform.

    HashtagInput:
      type: object
      description: Vom Client bereitgestellte Daten zum Anlegen eines Hashtags.
      required:
        - name
      properties:
        name:
          type: string
          description: >-
            Kanonischer, eindeutiger Name des Hashtags ohne führendes „#“. Namen
            werden case-insensitiv behandelt: `Java` und `java` bezeichnen
            denselben Hashtag und gelten daher als eindeutig identisch.
          minLength: 1
          maxLength: 50
          pattern: '^[A-Za-z0-9_]+$'
          example: java
        description:
          type: string
          description: Optionale, kurze Beschreibung des Themas des Hashtags.
          maxLength: 200
          example: Tutorials und Neuigkeiten rund um die Java-Sprache und -Plattform.
      additionalProperties: false

    HashtagUpdate:
      type: object
      description: >-
        Vom Client bereitgestellte Daten zum Aktualisieren der Beschreibung
        eines Hashtags. Der Name ist unveränderlich und wird über den Pfad
        bestimmt.
      properties:
        description:
          type: string
          description: >-
            Kurze Beschreibung des Themas des Hashtags. Ein leerer bzw. nicht
            gesendeter Wert entfernt die Beschreibung.
          maxLength: 200
          example: Tutorials und Neuigkeiten rund um die Java-Sprache und -Plattform.
      additionalProperties: false

    AuthorSummary:
      type: object
      description: >-
        Kurzprofil eines Autors, wie es in Blogpost-Antworten eingebettet wird.
        Enthält bewusst nicht den technischen Benutzernamen.
      readOnly: true
      required:
        - id
        - name
        - avatarUrl
      properties:
        id:
          type: string
          format: uuid
          description: Eindeutige ID des Autors.
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        name:
          type: string
          description: Echter Name des Autors.
          example: Erika Mustermann
        motto:
          type: string
          description: Persönliches Motto des Autors.
          maxLength: 30
          example: Immer neugierig bleiben.
        avatarUrl:
          type: string
          format: uri
          nullable: true
          description: >-
            URL des Avatar-Bildes des Autors inklusive Versions-Token für
            Cache-Busting, oder `null`, falls kein Avatar hinterlegt ist. Details
            zum Versions-Token siehe Schema `Author`.
          example: 'https://localhost:8080/authors/7c9e6679-7425-40de-944b-e07fc1f90ae7/avatar?v=8f3a1c9d'

    AuthorInput:
      type: object
      description: Vom Client bereitgestellte Daten zum Anlegen eines Autors.
      required:
        - username
        - name
      properties:
        username:
          type: string
          description: >-
            Technischer Benutzername für den API-Zugang. Unveränderlich nach
            dem Anlegen.
          minLength: 1
          maxLength: 50
          example: emustermann
        name:
          type: string
          description: Echter Name des Autors.
          minLength: 1
          maxLength: 100
          example: Erika Mustermann
        motto:
          type: string
          description: Persönliches Motto des Autors.
          maxLength: 30
          example: Immer neugierig bleiben.
      additionalProperties: false

    AuthorEditable:
      type: object
      description: >-
        Die vom Autor selbst editierbaren Felder (`name` und `motto`). Wird beim
        Ersetzen (`PUT`) verwendet. Es handelt sich um ein vollständiges
        Ersetzen dieser Felder: Ein nicht mitgesendetes `motto` wird entfernt.
      required:
        - name
      properties:
        name:
          type: string
          description: Echter Name des Autors.
          minLength: 1
          maxLength: 100
          example: Erika Mustermann
        motto:
          type: string
          description: >-
            Persönliches Motto des Autors. Wird das Feld weggelassen, gilt das
            Motto als entfernt.
          maxLength: 30
          example: Immer neugierig bleiben.
      additionalProperties: false

    Author:
      type: object
      description: Ein vollständiger Autor inklusive der servergenerierten Felder.
      required:
        - id
        - username
        - name
        - avatarUrl
      properties:
        id:
          type: string
          format: uuid
          description: Eindeutige, vom Server vergebene ID des Autors.
          readOnly: true
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        username:
          type: string
          description: >-
            Technischer Benutzername für den API-Zugang. Wird beim Anlegen
            gesetzt und ist danach unveränderlich.
          minLength: 1
          maxLength: 50
          example: emustermann
        name:
          type: string
          description: Echter Name des Autors.
          minLength: 1
          maxLength: 100
          example: Erika Mustermann
        motto:
          type: string
          description: Persönliches Motto des Autors.
          maxLength: 30
          example: Immer neugierig bleiben.
        avatarUrl:
          type: string
          format: uri
          nullable: true
          readOnly: true
          description: >-
            URL des Avatar-Bildes des Autors, oder `null`, falls kein Avatar
            hinterlegt ist.


            Der reine Pfad (`/authors/{id}/avatar`) wäre für den Client
            ableitbar. Der Server hängt hier aber zusätzlich einen
            **Versions-Token** als Query-Parameter an (z. B. `?v=8f3a1c9d` –
            etwa ein Hash des Bildinhalts). Dieser Token ändert sich bei jedem
            neuen Upload. Dadurch ist aggressives Caching möglich: Das Bild wird
            unter der versionierten URL langfristig zwischengespeichert; lädt
            der Autor ein neues Avatar hoch, ändert sich der Token, die URL gilt
            als „neu“ und Clients bzw. CDNs holen automatisch das aktuelle Bild
            (**Cache-Busting**). Deshalb wird hier die vollständige, versionierte
            URL zurückgegeben und nicht nur der ableitbare Pfad.
          example: 'https://localhost:8080/authors/7c9e6679-7425-40de-944b-e07fc1f90ae7/avatar?v=8f3a1c9d'

    RatingInput:
      type: object
      description: Vom Client bereitgestellte Daten eines Ratings.
      required:
        - stars
      properties:
        stars:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: Sternebewertung von 1 (schlecht) bis 5 (ausgezeichnet).
          example: 5
        comment:
          type: string
          maxLength: 1000
          description: >-
            Optionaler Freitextkommentar zur Bewertung. Eine Bewertung ist auch
            ohne Kommentar zulässig.
          example: Sehr hilfreicher und gut geschriebener Beitrag!
      additionalProperties: false

    Rating:
      type: object
      description: Eine Bewertung eines Blogposts inklusive der servergenerierten Felder.
      required:
        - id
        - stars
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Eindeutige, vom Server vergebene ID des Ratings.
          readOnly: true
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        stars:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: Sternebewertung von 1 (schlecht) bis 5 (ausgezeichnet).
          example: 5
        comment:
          type: string
          maxLength: 1000
          description: Optionaler Freitextkommentar zur Bewertung.
          example: Sehr hilfreicher und gut geschriebener Beitrag!
        createdAt:
          type: string
          format: date-time
          description: >-
            Zeitpunkt, zu dem das Rating angelegt wurde (ISO 8601). Wird vom
            Server gesetzt.
          readOnly: true
          example: '2026-07-22T11:19:00Z'

    # ----- Problems -----

    ProblemDetail:
      description: |
        Problem details defined by [RFC-9457](https://datatracker.ietf.org/doc/rfc9457/)
      type: object
      properties:
        instance:
          type: string
          format: uri-reference
          maxLength: 2000
          description: |
            A URI reference that identifies the specific
            occurrence of the problem.  It may or may not yield further
            information if dereferenced.
        type:
          type: string
          format: uri-reference
          maxLength: 2000
          description: |
            A URI reference [RFC3986] that identifies the
            problem type.  This specification encourages that, when
            dereferenced, it provide human-readable documentation for the
            problem type.  When this member is not present, its value is
            assumed to be "about:blank".
          example: about:blank
        title:
          type: string
          maxLength: 2000
          description: |
            A short, human-readable summary of the problem
            type.  It **SHOULD NOT** change from occurrence to occurrence of the
            problem, except for purposes of localization (e.g., using
            proactive content negotiation; see [RFC7231], Section 3.4).
        detail:
          type: string
          maxLength: 2000
          description: |
            A human-readable explanation specific to this
            occurrence of the problem.
        status:
          type: integer
          format: int32
          description: |
            The HTTP status code ([RFC7231], Section 6)
            generated by the origin server for this occurrence of the problem.
          minimum: 100
          maximum: 599
          example: 404
      required:
        - instance
        - type
        - title
        - detail
        - status

    Field:
      description: |
        The affected field.
      type: string
      example: "name"

    TooShortViolation:
      type: object
      description: >-
        Ein Textfeld unterschreitet die zulässige Mindestlänge (`minLength`).
      properties:
        errorCode:
          type: string
          enum:
            - TOO_SHORT
        field:
          $ref: '#/components/schemas/Field'
        referenceValue:
          description: Die geforderte Mindestlänge.
          type: number
          example: 1
      required:
        - errorCode
        - field
        - referenceValue

    TooLongViolation:
      type: object
      description: >-
        Ein Textfeld überschreitet die zulässige Höchstlänge (`maxLength`).
      properties:
        errorCode:
          type: string
          enum:
            - TOO_LONG
        field:
          $ref: '#/components/schemas/Field'
        referenceValue:
          description: Die erlaubte Höchstlänge.
          type: number
          example: 50
      required:
        - errorCode
        - field
        - referenceValue

    MustBePresentViolation:
      type: object
      description: Ein Pflichtfeld wurde nicht mitgesendet.
      properties:
        errorCode:
          type: string
          enum:
            - MUST_BE_PRESENT
        field:
          $ref: '#/components/schemas/Field'
      required:
        - errorCode
        - field

    NumberViolation:
      type: object
      description: >-
        Ein numerisches Feld verletzt eine Ober- oder Untergrenze (`minimum`
        bzw. `maximum`). Der konkrete `errorCode` gibt an, welche Grenze verletzt
        wurde.
      properties:
        errorCode:
          type: string
          enum:
            - GREATER_THAN_OR_EQUAL
            - GREATER_THAN
            - SMALLER_THAN_OR_EQUAL
            - SMALLER_THAN
        field:
          $ref: '#/components/schemas/Field'
        actualValue:
          description: Der tatsächlich übergebene Wert.
          type: number
          example: 10
        referenceValue:
          description: Der Grenzwert, gegen den geprüft wurde.
          type: number
          example: 5
      required:
        - errorCode
        - field
        - actualValue
        - referenceValue

    ProblemDetailWithViolations:
      description: >-
        Fehlerantwort für fehlgeschlagene Validierungen. Erweitert das
        Basis-Schema `ProblemDetail` (via `allOf`) um eine Liste konkreter
        Verletzungen und wird für den Status 422 verwendet.
      allOf:
        # allOf-Anwendungsfall: Komposition/Erweiterung. Ein spezialisiertes
        # Fehlerschema entsteht, indem das gemeinsame Basis-Schema `ProblemDetail`
        # unverändert übernommen und um zusätzliche Member (`violations`) ergänzt
        # wird. Eine gültige Instanz muss beide Teilschemas erfüllen.
        - $ref: '#/components/schemas/ProblemDetail'
        - type: object
          properties:
            violations:
              type: array
              # anyOf-Anwendungsfall: heterogene Liste. Jedes Element ist genau
              # eine von mehreren möglichen Verletzungsformen; welche zutrifft,
              # unterscheidet der jeweilige `errorCode`. Ein Element ist gültig,
              # sobald es (mindestens) eines der Teilschemas erfüllt.
              items:
                anyOf:
                  - $ref: '#/components/schemas/MustBePresentViolation'
                  - $ref: '#/components/schemas/TooShortViolation'
                  - $ref: '#/components/schemas/TooLongViolation'
                  - $ref: '#/components/schemas/NumberViolation'
              maxItems: 200
              description: >-
                Liste der einzelnen Regelverletzungen, die bei der Validierung
                der Anfrage aufgetreten sind.
          required:
            - violations

  responses:
    BadRequest:
      description: >-
        Die Anfrage ist syntaktisch fehlerhaft und konnte nicht verarbeitet
        werden (z. B. ungültiges JSON oder ein Feld mit falschem Datentyp).
        Inhaltliche Validierungsfehler an einzelnen Feldern werden dagegen mit
        Status 422 gemeldet.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Bad Request
            status: 400
            detail: Der Anfrage-Body ist kein gültiges JSON.
            instance: /blogposts
    UnprocessableEntity:
      description: >-
        Die Anfrage war syntaktisch korrekt, verletzt aber inhaltliche
        Validierungsregeln. Die einzelnen Verletzungen stehen im Feld
        `violations`.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetailWithViolations'
          example:
            type: about:blank
            title: Unprocessable Entity
            status: 422
            detail: Die übergebenen Daten verletzen eine oder mehrere Validierungsregeln.
            instance: /blogposts
            violations:
              - errorCode: MUST_BE_PRESENT
                field: content
              - errorCode: TOO_LONG
                field: title
                referenceValue: 50
    NotFound:
      description: Es existiert keine Ressource mit der angegebenen ID.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Not Found
            status: 404
            detail: Es existiert kein Blogpost mit der angegebenen ID.
            instance: /blogposts/3fa85f64-5717-4562-b3fc-2c963f66afa6
    Conflict:
      description: >-
        Die Anfrage steht im Konflikt mit dem aktuellen Zustand (z. B.
        Benutzername bereits vergeben oder es existiert bereits ein Hashtag mit
        dem angegebenen Namen – Vergleich case-insensitiv).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Conflict
            status: 409
            detail: Es existiert bereits ein Hashtag mit dem angegebenen Namen.
            instance: /hashtags
    PayloadTooLarge:
      description: Die hochgeladene Datei überschreitet die zulässige Größe.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Payload Too Large
            status: 413
            detail: Das Avatar-Bild überschreitet die zulässige Maximalgröße.
            instance: /authors/7c9e6679-7425-40de-944b-e07fc1f90ae7/avatar
    UnsupportedMediaType:
      description: Der Medientyp der Anfrage wird nicht unterstützt (erlaubt sind image/png und image/jpeg).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Unsupported Media Type
            status: 415
            detail: Es werden nur die Medientypen image/png und image/jpeg unterstützt.
            instance: /authors/7c9e6679-7425-40de-944b-e07fc1f90ae7/avatar
    InternalServerError:
      description: Unerwarteter Fehler auf dem Server.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: about:blank
            title: Internal Server Error
            status: 500
            detail: Es ist ein unerwarteter Fehler aufgetreten.
            instance: /blogposts
