openapi: 3.0.1

info:
  title: Blogpost API
  description: >-
    API zur Verwaltung von Blogposts. Ein Blogpost besteht aus einem Titel
    (höchstens 50 Zeichen) und einem Textinhalt. Zusätzlich wird der Zeitpunkt
    der letzten Änderung geführt.
  version: 1.0.0

servers:
  - url: 'https://localhost:8080'
    description: Lokaler Entwicklungsserver

tags:
  - name: Blogposts
    description: Operationen zum Verwalten von Blogposts
  - name: Ratings
    description: >-
      Operationen zum Verwalten der Bewertungen (Ratings) eines Blogposts.
      Ratings sind eine Subressource eines Blogposts und existieren nicht
      unabhängig von diesem.

paths:
  /blogposts:
    get:
      tags:
        - Blogposts
      summary: Alle Blogposts abrufen
      description: >-
        Liefert die Liste aller vorhandenen Blogposts.

        Jeder Blogpost enthält immer die aggregierten Bewertungsfelder
        `averageRating` und `ratingCount`. Die einzelnen Ratings werden aus
        Gründen der Datensparsamkeit (Vermeidung von Over-Fetching)
        standardmäßig nicht mitgeliefert. Über den Parameter `includeRatings`
        können sie bei Bedarf eingebettet werden.
      operationId: listBlogposts
      parameters:
        - $ref: '#/components/parameters/IncludeRatings'
      responses:
        '200':
          description: Liste aller Blogposts (kann leer sein).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Blogpost'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Blogposts
      summary: Blogpost anlegen
      description: >-
        Legt einen neuen Blogpost an. Die Felder `id` und `lastModified` werden
        vom Server vergeben und dürfen nicht mitgesendet werden.
      operationId: createBlogpost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogpostInput'
      responses:
        '201':
          description: Der Blogpost wurde angelegt.
          headers:
            Location:
              description: URL des neu angelegten Blogposts.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blogpost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /blogposts/{id}:
    parameters:
      - $ref: '#/components/parameters/BlogpostId'
    get:
      tags:
        - Blogposts
      summary: Einzelnen Blogpost abrufen
      description: >-
        Liefert den Blogpost mit der angegebenen ID. Wie bei der Liste können
        über `includeRatings` die einzelnen Ratings eingebettet werden.
      operationId: getBlogpost
      parameters:
        - $ref: '#/components/parameters/IncludeRatings'
      responses:
        '200':
          description: Der angeforderte Blogpost.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blogpost'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Blogposts
      summary: Blogpost ersetzen
      description: >-
        Ersetzt Titel und Inhalt des Blogposts mit der angegebenen ID
        vollständig. Der Zeitstempel `lastModified` wird dabei vom Server
        aktualisiert. Da sich die Ressource ändert, wird der aktualisierte
        Blogpost mit Status 200 zurückgegeben.
      operationId: replaceBlogpost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogpostInput'
      responses:
        '200':
          description: Der Blogpost wurde ersetzt und wird zurückgegeben.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Blogpost'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Blogposts
      summary: Blogpost löschen
      description: Löscht den Blogpost mit der angegebenen ID.
      operationId: deleteBlogpost
      responses:
        '204':
          description: Der Blogpost wurde gelöscht. Kein Inhalt im Body.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /blogposts/{id}/ratings:
    parameters:
      - $ref: '#/components/parameters/BlogpostId'
    get:
      tags:
        - Ratings
      summary: Alle Ratings eines Blogposts abrufen
      description: >-
        Liefert alle Bewertungen (Ratings) des Blogposts mit der angegebenen ID.
      operationId: listRatings
      responses:
        '200':
          description: Liste aller Ratings des Blogposts (kann leer sein).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Rating'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Ratings
      summary: Rating anlegen
      description: >-
        Fügt dem Blogpost mit der angegebenen ID eine neue Bewertung hinzu. Die
        Felder `id` und `createdAt` werden vom Server vergeben und dürfen nicht
        mitgesendet werden. Ein einmal angelegtes Rating ist unveränderlich; es
        gibt daher weder eine Ersetzen- noch eine Löschen-Operation.
      operationId: createRating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingInput'
      responses:
        '201':
          description: Das Rating wurde angelegt.
          headers:
            Location:
              description: URL des neu angelegten Ratings.
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /blogposts/{id}/ratings/{ratingId}:
    parameters:
      - $ref: '#/components/parameters/BlogpostId'
      - $ref: '#/components/parameters/RatingId'
    get:
      tags:
        - Ratings
      summary: Einzelnes Rating abrufen
      description: >-
        Liefert das Rating mit der angegebenen `ratingId` des Blogposts mit der
        angegebenen `id`.
      operationId: getRating
      responses:
        '200':
          description: Das angeforderte Rating.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    BlogpostId:
      name: id
      in: path
      required: true
      description: Eindeutige ID des Blogposts.
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6

    RatingId:
      name: ratingId
      in: path
      required: true
      description: Eindeutige ID des Ratings innerhalb des Blogposts.
      schema:
        type: string
        format: uuid
      example: 7c9e6679-7425-40de-944b-e07fc1f90ae7

    IncludeRatings:
      name: includeRatings
      in: query
      required: false
      description: >-
        Legt fest, ob die einzelnen Ratings in die zurückgelieferten Blogposts
        eingebettet werden. Bei `false` (Standard) enthält jeder Blogpost nur
        die aggregierten Felder `averageRating` und `ratingCount`; das Feld
        `ratings` wird weggelassen. Bei `true` wird zusätzlich das Feld
        `ratings` mit allen Bewertungen gefüllt.
      schema:
        type: boolean
        default: false
      example: true

  schemas:
    BlogpostInput:
      type: object
      description: Vom Client bereitgestellte Daten eines Blogposts.
      required:
        - title
        - content
      properties:
        title:
          type: string
          description: Titel des Blogposts.
          minLength: 1
          maxLength: 50
          example: Mein erster Blogpost
        content:
          type: string
          description: Textinhalt des Blogposts (Plaintext).
          example: Dies ist der Inhalt meines ersten Blogposts.
      additionalProperties: false

    Blogpost:
      type: object
      description: Ein vollständiger Blogpost inklusive der servergenerierten Felder.
      required:
        - id
        - title
        - content
        - lastModified
      properties:
        id:
          type: string
          format: uuid
          description: Eindeutige, vom Server vergebene ID des Blogposts.
          readOnly: true
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        title:
          type: string
          description: Titel des Blogposts.
          minLength: 1
          maxLength: 50
          example: Mein erster Blogpost
        content:
          type: string
          description: Textinhalt des Blogposts (Plaintext).
          example: Dies ist der Inhalt meines ersten Blogposts.
        lastModified:
          type: string
          format: date-time
          description: >-
            Zeitpunkt der letzten Änderung (ISO 8601). Wird vom Server
            gesetzt und aktualisiert.
          readOnly: true
          example: '2026-07-22T11:19:00Z'
        averageRating:
          type: number
          format: double
          nullable: true
          minimum: 1
          maximum: 5
          description: >-
            Durchschnittliche Sternebewertung über alle Ratings dieses
            Blogposts. Ist `null`, solange noch keine Ratings vorliegen
            (`ratingCount` ist dann `0`).
          readOnly: true
          example: 4.5
        ratingCount:
          type: integer
          format: int32
          minimum: 0
          description: Anzahl der für diesen Blogpost abgegebenen Ratings.
          readOnly: true
          example: 12
        ratings:
          type: array
          description: >-
            Die einzelnen Ratings dieses Blogposts. Wird nur eingebettet, wenn
            die Anfrage den Parameter `includeRatings=true` gesetzt hat, und
            sonst weggelassen.
          readOnly: true
          items:
            $ref: '#/components/schemas/Rating'

    RatingInput:
      type: object
      description: Vom Client bereitgestellte Daten eines Ratings.
      required:
        - stars
      properties:
        stars:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: Sternebewertung von 1 (schlecht) bis 5 (ausgezeichnet).
          example: 5
        comment:
          type: string
          maxLength: 1000
          description: >-
            Optionaler Freitextkommentar zur Bewertung. Eine Bewertung ist auch
            ohne Kommentar zulässig.
          example: Sehr hilfreicher und gut geschriebener Beitrag!
      additionalProperties: false

    Rating:
      type: object
      description: Eine Bewertung eines Blogposts inklusive der servergenerierten Felder.
      required:
        - id
        - stars
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Eindeutige, vom Server vergebene ID des Ratings.
          readOnly: true
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        stars:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: Sternebewertung von 1 (schlecht) bis 5 (ausgezeichnet).
          example: 5
        comment:
          type: string
          maxLength: 1000
          description: Optionaler Freitextkommentar zur Bewertung.
          example: Sehr hilfreicher und gut geschriebener Beitrag!
        createdAt:
          type: string
          format: date-time
          description: >-
            Zeitpunkt, zu dem das Rating angelegt wurde (ISO 8601). Wird vom
            Server gesetzt.
          readOnly: true
          example: '2026-07-22T11:19:00Z'

    Error:
      type: object
      description: Standardisierte Fehlerantwort.
      required:
        - status
        - message
      properties:
        status:
          type: integer
          format: int32
          description: HTTP-Statuscode des Fehlers.
          example: 404
        message:
          type: string
          description: Menschenlesbare Beschreibung des Fehlers.
          example: Blogpost nicht gefunden.

  responses:
    BadRequest:
      description: Die Anfrage war fehlerhaft (z. B. Titel länger als 50 Zeichen oder Pflichtfeld fehlt).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Es existiert kein Blogpost mit der angegebenen ID.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Unerwarteter Fehler auf dem Server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
